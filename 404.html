<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Error 404 — I Copa de Software</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;700&family=Press+Start+2P&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="assets/starwars.png">
</head>

<body class="page-404">
    <div class="matrix-bg"></div>

    <main class="container centered-content">
        <div class="error-box">
            <h1 class="error-code">404</h1>
            <h2 class="error-title">// STACK_OVERFLOW_EXCEPTION</h2>

            <div class="error-description">
                <p><code>[ERROR]</code> O recurso solicitado não foi encontrado no servidor.</p>
                <p>O ponteiro que você seguiu resultou em um <strong>Null Pointer Exception</strong>. Verifique a URL ou
                    retorne ao ponto de entrada principal.</p>
            </div>

            <div class="error-actions">
                <a href="index.html" class="link-chip">
                    <i class="fa-solid fa-house-code"></i> Main(root)
                </a>
            </div>
        </div>
    </main>

    <script src="js/effects/matrix.js"></script>
</body>

</html>
